name: Upload to TeraBox
on:
  workflow_dispatch:
    inputs:
      url:
        description: YouTube URL to upload
        required: true
      quality:
        description: Video quality (360p, 480p, 720p, 1080p, best)
        required: false
        default: '720p'
      task_id:
        description: Task ID for tracking
        required: false
        default: ''
      terabox_ndus:
        description: TeraBox NDUS cookie
        required: false
        default: ''
      terabox_ndut_fmt:
        description: TeraBox NDUT_FMT cookie
        required: false
        default: ''
      terabox_csrf:
        description: TeraBox csrf token
        required: false
        default: ''
      terabox_browserid:
        description: TeraBox browserid cookie
        required: false
        default: ''
      terabox_jstoken:
        description: TeraBox jsToken
        required: false
        default: ''
      terabox_remote_dir:
        description: TeraBox remote directory
        required: false
        default: '/stream_videos'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg
          pip install -U yt-dlp bgutil-ytdlp-pot-provider requests
          git clone --single-branch --branch 1.3.1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git ~/bgutil-ytdlp-pot-provider
          cd ~/bgutil-ytdlp-pot-provider/server && npm ci && npx tsc
          echo "--- bgutil build check ---"
          ls -la ~/bgutil-ytdlp-pot-provider/server/build/main.js && echo "BUILD OK" || echo "BUILD FAILED"
          echo "--- yt-dlp plugin check ---"
          yt-dlp --js-runtimes node --list-extractors 2>&1 | head -5 || true
          yt-dlp -v --js-runtimes node "https://www.youtube.com/watch?v=dQw4w9WgXcQ" -j --skip-download 2>&1 | grep -i "pot\|plugin\|bgutil" || echo "No POT plugin output"

      - name: Upload to TeraBox
        id: upload
        env:
          TASK_ID: ${{ inputs.task_id }}
          URL: ${{ inputs.url }}
          QUALITY: ${{ inputs.quality }}
          TERABOX_NDUS: ${{ inputs.terabox_ndus || secrets.TERABOX_NDUS }}
          TERABOX_NDUT_FMT: ${{ inputs.terabox_ndut_fmt || secrets.TERABOX_NDUT_FMT }}
          TERABOX_CSRF: ${{ inputs.terabox_csrf || secrets.TERABOX_CSRF }}
          TERABOX_BROWSERID: ${{ inputs.terabox_browserid || secrets.TERABOX_BROWSERID }}
          TERABOX_JSTOKEN: ${{ inputs.terabox_jstoken || secrets.TERABOX_JSTOKEN }}
          TERABOX_REMOTE_DIR: ${{ inputs.terabox_remote_dir || secrets.TERABOX_REMOTE_DIR || '/stream_videos' }}
        run: |
          python3 ${{ github.workspace }}/upload.py
          if [ -f /tmp/tb_result.json ]; then
            SHARE_URL=$(python3 -c "import json; d=json.load(open('/tmp/tb_result.json')); print(d.get('share_url',''))")
            echo "share_url=$SHARE_URL" >> "$GITHUB_OUTPUT"
            echo "=== DONE: $SHARE_URL ==="
          else
            echo "ERROR: No result file"
            exit 1
          fi

      - name: Print result
        run: |
          echo "========================================"
          echo "TeraBox upload complete!"
          echo "Share URL: ${{ steps.upload.outputs.share_url }}"
          echo "========================================"
